services:
  db:
    image: postgres:16-alpine
    container_name: jptaxi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: JPTaxi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - jptaxi_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d JPTaxi"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  jptaxi_pg_data:
