spring.application.name=${SPRING_APPLICATION_NAME:application}

# Render provides the HTTP port through the PORT environment variable.
server.port=${PORT:8080}

# PostgreSQL / Supabase
# Set these values in Render -> Service -> Environment.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# Keep "none" if you already imported dump.sql to Supabase.
# Change SPRING_JPA_HIBERNATE_DDL_AUTO=update on Render only if you want Hibernate to update/create tables automatically.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Small free instances should use a small connection pool.
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}

# Frontend URL
# Local: http://localhost:5173
# Render/Vercel: set APP_FRONTEND_URL=https://your-project.vercel.app
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.frontend.reset-password-url=${APP_FRONTEND_RESET_PASSWORD_URL:${app.frontend-url}/reset-password}
app.password-reset.expiration-minutes=${APP_PASSWORD_RESET_EXPIRATION_MINUTES:30}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173,https://*.vercel.app}

spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:40MB}

# Mail sender
# Do not hard-code Gmail App Passwords in this file.
app.mail.from=${APP_MAIL_FROM:no-reply@example.com}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8

spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_SMTP_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_SMTP_WRITETIMEOUT:10000}

# Debug mail
spring.mail.properties.mail.debug=${SPRING_MAIL_DEBUG:false}


# ===============================
# Supabase Storage / S3
# ===============================
supabase.storage.endpoint=${SUPABASE_STORAGE_ENDPOINT:}
supabase.storage.region=${SUPABASE_STORAGE_REGION:}
supabase.storage.access-key=${SUPABASE_STORAGE_ACCESS_KEY:}
supabase.storage.secret-key=${SUPABASE_STORAGE_SECRET_KEY:}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:}
supabase.storage.public-url=${SUPABASE_STORAGE_PUBLIC_URL:}
